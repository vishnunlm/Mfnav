<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#030812"/>
<title>MFSignal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060a14;--s1:#0a1020;--s2:#0e1628;--s3:#121e32;
  --b1:#1a2840;--b2:#223050;
  --t1:#f0f6ff;--t2:#8ba8cc;--t3:#4a6080;
  --green:#00d68f;--gd:#00d68f15;--gb:#001f12;
  --amber:#f5a623;--ad:#f5a62315;
  --blue:#4db8ff;--bd:#4db8ff12;
  --red:#ff5c5c;--rd:#ff5c5c12;
  --purple:#a78bfa;
  --r:12px;--r-sm:8px;
}
html{font-size:14px}
body{
  background:var(--bg);color:var(--t1);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;overflow-x:hidden;line-height:1.5
}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 15%,#00d68f07,transparent 70%),
    radial-gradient(ellipse 50% 35% at 90% 80%,#4db8ff07,transparent 70%)
}

/* ── LOCK ──────────────────────────────────────────────────── */
#lockScreen{
  position:fixed;inset:0;z-index:9999;background:#020c18;
  display:flex;align-items:center;justify-content:center;padding:20px;
  transition:opacity .4s ease
}
#lockScreen::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(0,214,143,.07),transparent 70%)
}
#lockScreen.gone{opacity:0;pointer-events:none}
.lk-card{
  width:100%;max-width:380px;background:#0d1826;
  border:1.5px solid #2c4060;border-radius:20px;padding:40px 32px 34px;
  box-shadow:0 32px 80px rgba(0,0,0,.85),0 0 60px rgba(0,214,143,.07);
  position:relative;z-index:1;animation:cardIn .45s cubic-bezier(.175,.885,.32,1.275)
}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
.lk-card::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1.5px;
  background:linear-gradient(90deg,transparent,#00d68f,#4db8ff,transparent)
}
.lk-logo{
  width:58px;height:58px;border-radius:14px;margin:0 auto 20px;
  background:linear-gradient(135deg,#00d68f,#00a86b);
  display:flex;align-items:center;justify-content:center;font-size:27px;
  box-shadow:0 6px 30px rgba(0,214,143,.4);animation:float 3s ease-in-out infinite
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.lk-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:5px;color:#f0f6ff;letter-spacing:-.02em}
.lk-sub{font-size:11px;color:#506878;text-align:center;margin-bottom:28px;letter-spacing:.05em;text-transform:uppercase}
.lk-label{font-size:11px;font-weight:700;color:#6a8aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:block}
.lk-wrap{position:relative;margin-bottom:10px}
.lk-input{
  width:100%;padding:14px 46px 14px 16px;background:#081018;
  border:1.5px solid #2c4060;border-radius:10px;
  color:#f0f6ff;font-size:16px;font-family:monospace;letter-spacing:.1em;
  outline:none;transition:border-color .2s,box-shadow .2s;-webkit-text-fill-color:#f0f6ff
}
.lk-input::placeholder{font-family:inherit;font-size:14px;color:#344858;letter-spacing:.02em;opacity:1}
.lk-input:focus{border-color:rgba(0,214,143,.55);box-shadow:0 0 0 3px rgba(0,214,143,.1)}
.lk-input.err{border-color:rgba(255,92,92,.6);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)}70%{transform:translateX(6px)}}
.lk-eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:#344858;font-size:18px;cursor:pointer;transition:color .2s;line-height:1}
.lk-eye:hover{color:#8ba8cc}
.lk-err{
  display:none;align-items:center;gap:7px;margin-bottom:10px;
  background:rgba(255,92,92,.07);border:1px solid rgba(255,92,92,.25);
  border-radius:8px;padding:10px 13px;font-size:12px;color:#ff5c5c
}
.lk-err.show{display:flex}
.lk-dots{display:flex;gap:6px;justify-content:center;margin:10px 0 14px}
.lk-dot{width:8px;height:8px;border-radius:50%;background:#1a2840;border:1px solid #2c4060;transition:all .2s}
.lk-dot.used{background:#ff5c5c;border-color:#ff5c5c}
.lk-cool{display:none;text-align:center;font-size:12px;color:#f5a623;margin-bottom:12px;line-height:1.7}
.lk-cool.show{display:block}
.lk-cool b{display:block;font-size:26px;font-family:monospace;color:#ff5c5c;margin-top:3px}
.lk-btn{
  width:100%;padding:15px;border-radius:10px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#00d68f,#00a86b);
  color:#001810;font-size:15px;font-weight:800;letter-spacing:.04em;
  transition:all .2s;margin-bottom:16px
}
.lk-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,214,143,.45)}
.lk-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.lk-remember{display:flex;align-items:center;justify-content:space-between;gap:10px}
.lk-rlbl{font-size:12px;color:#506878}
.tog{position:relative;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:#1a2840;border:1px solid #2c4060;border-radius:20px;cursor:pointer;transition:all .2s}
.tog-track::after{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.tog input:checked+.tog-track{background:#00d68f;border-color:#00d68f}
.tog input:checked+.tog-track::after{transform:translateX(18px)}
.lk-footer{margin-top:20px;text-align:center;font-size:11px;color:#2c3e50;line-height:1.7}

/* ── SPLASH ────────────────────────────────────────────────── */
#splash{
  position:fixed;inset:0;z-index:5000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .5s ease
}
#splash.hide{opacity:0;pointer-events:none}
.sp-logo{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#00d68f,#00a86b);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 32px rgba(0,214,143,.4);animation:float 2s ease-in-out infinite}
.sp-title{font-size:22px;font-weight:800;color:#f0f6ff;letter-spacing:-.01em}
.sp-sub{font-size:11px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.sp-bar{width:180px;height:2px;background:var(--b1);border-radius:2px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,#00d68f,#4db8ff);width:0%;transition:width .35s ease;border-radius:2px}
#sp-msg{font-size:11px;color:var(--t3);font-family:monospace}

/* ── NAV BAR ───────────────────────────────────────────────── */
.navbar{
  position:sticky;top:0;z-index:500;height:56px;
  background:rgba(6,10,20,.93);border-bottom:1px solid var(--b1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px
}
.nav-brand{display:flex;align-items:center;gap:9px;text-decoration:none}
.nav-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#00d68f,#00a86b);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.nav-name{font-size:16px;font-weight:800;color:#f0f6ff;letter-spacing:-.01em}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-time{font-size:11px;color:var(--t2);font-family:monospace;padding:4px 10px;background:var(--s1);border:1px solid var(--b1);border-radius:6px}
.nav-lock{width:32px;height:32px;border-radius:7px;background:var(--s1);border:1px solid var(--b1);color:var(--t3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
.nav-lock:hover{border-color:rgba(255,92,92,.4);color:#ff5c5c}

/* ── FUND TABS ─────────────────────────────────────────────── */
.fund-tabs-wrap{padding:14px 20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.fund-tabs{display:flex;gap:8px;min-width:max-content}
.ftab{
  padding:9px 20px;border-radius:var(--r-sm);border:1px solid var(--b1);
  background:var(--s1);color:var(--t3);font-size:12px;font-weight:600;
  white-space:nowrap;transition:all .2s;position:relative;overflow:hidden
}
.ftab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--fc,#00d68f);opacity:0;transition:opacity .2s}
.ftab.active{background:var(--s2);color:var(--fc,#00d68f);border-color:color-mix(in srgb,var(--fc,#00d68f) 28%,transparent)}
.ftab.active::after{opacity:1}
.ftab:hover:not(.active){background:var(--s2);color:var(--t2)}
.ftab-sub{font-size:9px;font-weight:400;opacity:.6;display:block;margin-top:2px}

/* ── LAYOUT ────────────────────────────────────────────────── */
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
.main{padding:16px 20px 80px;max-width:1200px;margin:0 auto;width:100%}

/* ── STATUS ────────────────────────────────────────────────── */
.status-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:8px 14px;background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r-sm);margin-bottom:14px;font-size:11px
}
.s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-dot.ok{background:#00d68f}
.s-dot.loading{background:#f5a623;animation:pulse .8s infinite}
.s-dot.err{background:#ff5c5c}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.s-text{color:var(--t2)}
.refresh-btn{
  margin-left:auto;padding:5px 12px;border-radius:6px;border:1px solid var(--b2);
  background:var(--s2);color:var(--t2);font-size:11px;font-weight:600;
  display:flex;align-items:center;gap:5px;transition:all .2s;cursor:pointer
}
.refresh-btn:hover{border-color:#00d68f;color:#00d68f}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MINI CARDS ────────────────────────────────────────────── */
.mini-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:9px;margin-bottom:14px}
.mini-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:13px 15px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden
}
.mini-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fc,#00d68f)}
.mini-card.active,.mini-card:hover{background:var(--s2);border-color:color-mix(in srgb,var(--fc,#00d68f) 25%,transparent)}
.mc-fund{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.mc-nav{font-size:21px;font-weight:800;line-height:1}
.mc-date{font-size:10px;color:var(--t3);margin-top:4px}
.mc-strategy{font-size:10px;color:var(--t2);margin-top:3px}

/* ── FUND HERO ─────────────────────────────────────────────── */
.fund-hero{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:20px;margin-bottom:14px;position:relative;overflow:hidden
}
.fund-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--fc,#00d68f),var(--fc2,#4db8ff))}
.hero-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px}
.hero-fund{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.hero-nav{font-size:38px;font-weight:800;line-height:1;letter-spacing:-.02em}
.hero-date{font-size:11px;color:var(--t3);margin-top:6px}
.hero-scheme{font-size:11px;color:var(--t2);margin-top:2px}
.hero-right{display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.stat-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid}
.pill-green{background:var(--gd);color:#00d68f;border-color:rgba(0,214,143,.3)}
.pill-amber{background:var(--ad);color:#f5a623;border-color:rgba(245,166,35,.3)}
.pill-none{background:var(--s2);color:var(--t3);border-color:var(--b2)}
.hero-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--b1)}
.hstat{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r-sm);padding:9px 14px;min-width:88px}
.hstat-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.hstat-val{font-size:16px;font-weight:700;line-height:1}

/* ── SECTION TITLE ─────────────────────────────────────────── */
.sec-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--b1)}

/* ── TABS ──────────────────────────────────────────────────── */
.tabs-bar{display:flex;gap:1px;border-bottom:1px solid var(--b1);margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:10px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);font-size:12px;font-weight:600;margin-bottom:-1px;transition:all .15s;white-space:nowrap;cursor:pointer}
.tab-btn.active{color:#f5a623;border-bottom-color:#f5a623}
.tab-btn:hover:not(.active){color:var(--t2)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* ── CHART PANEL ───────────────────────────────────────────── */
.chart-panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:12px}
.chart-toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.chart-title{font-size:12px;font-weight:700;color:var(--t1)}
.btn-group{display:flex;gap:3px}
.btn-pill{padding:4px 10px;border-radius:5px;border:1px solid var(--b2);background:transparent;color:var(--t3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-pill.active{background:var(--bd);border-color:rgba(77,184,255,.35);color:#4db8ff}
.btn-pill:hover:not(.active){background:var(--s2);color:var(--t2)}
.chart-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:10px;color:var(--t3)}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-line{width:14px;height:2px;border-radius:2px}

/* ── SIGNAL CALENDAR ───────────────────────────────────────── */
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.cal-card{
  background:var(--s2);border:1px solid var(--b2);border-radius:var(--r-sm);
  padding:13px;border-left:3px solid #00d68f;transition:transform .2s
}
.cal-card:hover{transform:translateY(-1px)}
.cal-month{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.cal-date{font-size:14px;font-weight:700}
.cal-nav{font-size:12px;color:var(--t1);margin-top:2px;font-family:monospace}
.cal-meta{font-size:10px;color:var(--t3);margin-top:4px}
.cal-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.cal-tag{background:var(--gb);color:#00d68f;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
.cal-ret{display:inline-block;margin-top:7px;font-size:12px;font-weight:700;padding:3px 8px;border-radius:5px}
.ret-pos{background:var(--gd);color:#00d68f}
.ret-neg{background:var(--rd);color:#ff5c5c}
.ret-pend{background:var(--bd);color:#4db8ff}
.no-signal{color:var(--t3);font-size:12px;padding:20px 0}

/* ── BACKTEST ──────────────────────────────────────────────── */
.bt-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px;margin-bottom:14px}
.bt-metric{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-sm);padding:12px 14px}
.bt-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.bt-val{font-size:18px;font-weight:700;line-height:1}
.slider-panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-sm);padding:14px;margin-bottom:12px}
input[type=range]{width:100%;accent-color:#f5a623;cursor:pointer;margin-top:6px}
.slider-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-top:4px}
.trade-wrap{max-height:400px;overflow-y:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--s2);position:sticky;top:0;z-index:2}
th{padding:9px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--b2)}
tbody tr{border-bottom:1px solid var(--b1);transition:background .15s}
tbody tr:hover{background:var(--s2)}
td{padding:9px 12px;font-size:12px}

/* ── DISCLAIMER ────────────────────────────────────────────── */
.disclaimer{
  font-size:11px;color:var(--t3);line-height:1.7;
  padding:10px 14px;background:var(--s1);border:1px solid var(--b1);
  border-left:3px solid #f5a623;border-radius:var(--r-sm);margin-bottom:14px
}
.disclaimer strong{color:#f5a623}

/* ── BOTTOM NAV ────────────────────────────────────────────── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:400;background:rgba(6,10,20,.95);border-top:1px solid var(--b1);backdrop-filter:blur(16px);padding:7px 0 max(7px,env(safe-area-inset-bottom))}
.bottom-nav-inner{display:flex;justify-content:space-around}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 12px;background:none;border:none;color:var(--t3);font-size:9px;font-weight:600;cursor:pointer;transition:color .2s}
.bnav-btn.active{color:#00d68f}
.bnav-icon{font-size:19px;line-height:1}

/* ── SCROLLBAR ─────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── RESPONSIVE ────────────────────────────────────────────── */
@media(max-width:768px){
  .main{padding:12px 12px 76px}
  .bottom-nav{display:block}
  .mini-cards{grid-template-columns:1fr 1fr}
  .fund-tabs-wrap{padding:10px 12px 0}
  .nav-time{display:none}
  .hero-nav{font-size:30px}
}
@media(max-width:480px){
  .mini-cards{grid-template-columns:1fr}
  .hero-row{flex-direction:column}
  .hero-right{align-items:flex-start}
  .bt-metrics{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lk-card">
    <div class="lk-logo">📡</div>
    <div class="lk-title">MFSignal</div>
    <div class="lk-sub">Private · Enter passphrase to continue</div>
    <label class="lk-label" for="lkInput">Passphrase</label>
    <div class="lk-wrap">
      <input class="lk-input" id="lkInput" type="password"
        placeholder="Enter passphrase..."
        onkeydown="if(event.key==='Enter')tryUnlock()"
        autocomplete="off" spellcheck="false"/>
      <button class="lk-eye" id="lkEye" onclick="toggleEye()">👁</button>
    </div>
    <div class="lk-err" id="lkErr"><span>⚠</span><span id="lkErrMsg">Incorrect passphrase.</span></div>
    <div class="lk-dots" id="lkDots">
      <div class="lk-dot" id="ld1"></div><div class="lk-dot" id="ld2"></div>
      <div class="lk-dot" id="ld3"></div><div class="lk-dot" id="ld4"></div>
      <div class="lk-dot" id="ld5"></div>
    </div>
    <div class="lk-cool" id="lkCool">Too many attempts. Wait <b id="lkTimer">30s</b></div>
    <button class="lk-btn" id="lkBtn" onclick="tryUnlock()">🔓 Unlock</button>
    <div class="lk-remember">
      <span class="lk-rlbl">Remember me on this device</span>
      <label class="tog">
        <input type="checkbox" id="lkRemember" checked/>
        <div class="tog-track"></div>
      </label>
    </div>
    <div class="lk-footer">MFSignal · AMFI official NAV data · Not investment advice</div>
  </div>
</div>
